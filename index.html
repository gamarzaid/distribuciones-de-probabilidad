<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Distribuciones de Probabilidad</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Barra lateral izquierda de controles */
        .sidebar {
            width: 320px;
            background-color: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
        }
        h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 10px;
            border-bottom: 2px solid #4F46E5;
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        label {
            font-size: 14px;
            font-weight: 600;
            color: #4b5563;
        }
        .value-display {
            font-family: monospace;
            font-weight: bold;
            color: #4F46E5;
            float: right;
        }
        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
        }
        input[type="range"] {
            cursor: pointer;
        }
        /* Área principal para el gráfico */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8fafc;
        }
        .chart-container {
            width: 100%;
            max-width: 900px;
            height: 500px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Distribuciones</h2>
        
        <div class="control-group">
            <label for="distSelect">Selecciona Modelo:</label>
            <select id="distSelect" onchange="cambiarDistribucion()">
                <option value="normal">Normal (Gaussiana)</option>
                <option value="binomial">Binomial</option>
                <option value="uniforme">Uniforme Continua</option>
                <option value="bernoulli">Bernoulli</option>
            </select>
        </div>

        <div id="controls-normal" class="dist-controls">
            <div class="control-group" style="margin-bottom: 15px;">
                <label>Media (μ): <span class="value-display" id="val-mu">0</span></label>
                <input type="range" id="param-mu" min="-10" max="10" step="0.5" value="0" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label>Desv. Estándar (σ): <span class="value-display" id="val-sigma">1</span></label>
                <input type="range" id="param-sigma" min="0.5" max="5" step="0.1" value="1" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-binomial" class="dist-controls" style="display:none;">
            <div class="control-group" style="margin-bottom: 15px;">
                <label>Ensayos (n): <span class="value-display" id="val-n">20</span></label>
                <input type="range" id="param-n" min="1" max="80" step="1" value="20" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label>Probabilidad éxito (p): <span class="value-display" id="val-p">0.5</span></label>
                <input type="range" id="param-p" min="0" max="1" step="0.01" value="0.5" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-uniforme" class="dist-controls" style="display:none;">
            <div class="control-group" style="margin-bottom: 15px;">
                <label>Mínimo (a): <span class="value-display" id="val-a">0</span></label>
                <input type="range" id="param-a" min="-10" max="4" step="1" value="0" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label>Máximo (b): <span class="value-display" id="val-b">10</span></label>
                <input type="range" id="param-b" min="5" max="20" step="1" value="10" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-bernoulli" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label>Probabilidad (p): <span class="value-display" id="val-bp">0.5</span></label>
                <input type="range" id="param-bp" min="0" max="1" step="0.05" value="0.5" oninput="actualizarGrafica()">
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-container">
            <canvas id="canvasGrafica"></canvas>
        </div>
    </div>

<script>
    let miGrafica;
    const ctx = document.getElementById('canvasGrafica').getContext('2d');

    // Cambia los paneles de control visibles en la barra lateral
    function cambiarDistribucion() {
        const dist = document.getElementById('distSelect').value;
        
        // Ocultar todos los paneles de parámetros
        document.querySelectorAll('.dist-controls').forEach(el => el.style.display = 'none');
        
        // Mostrar solo el panel seleccionado
        document.getElementById('controls-' + dist).style.display = 'block';
        
        actualizarGrafica();
    }

    // Función auxiliar para calcular factoriales (necesario para Binomial)
    function factorial(n) {
        if (n <= 1) return 1;
        let resultado = 1;
        for (let i = 2; i <= n; i++) resultado *= i;
        return resultado;
    }

    // Realiza los cálculos matemáticos y dibuja la gráfica
    function actualizarGrafica() {
        const dist = document.getElementById('distSelect').value;
        let labels = [], datos = [], tipoGrafica = 'line';

        if (dist === 'normal') {
            tipoGrafica = 'line';
            const mu = parseFloat(document.getElementById('param-mu').value);
            const sigma = parseFloat(document.getElementById('param-sigma').value);
            
            // Actualizar textos en la barra lateral
            document.getElementById('val-mu').innerText = mu;
            document.getElementById('val-sigma').innerText = sigma;

            // Generar puntos de la curva de Gauss (-4 sigma a +4 sigma)
            for (let x = mu - 4 * sigma; x <= mu + 4 * sigma; x += sigma / 10) {
                labels.push(x.toFixed(1));
                let fx = (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
                datos.push(fx);
            }
        } 
        else if (dist === 'binomial') {
            tipoGrafica = 'bar';
            const n = parseInt(document.getElementById('param-n').value);
            const p = parseFloat(document.getElementById('param-p').value);
            
            document.getElementById('val-n').innerText = n;
            document.getElementById('val-p').innerText = p;

            // Calcular PMF para cada posible número de éxitos k
            for (let k = 0; k <= n; k++) {
                labels.push(k);
                let combinacion = factorial(n) / (factorial(k) * factorial(n - k));
                let pk = combinacion * Math.pow(p, k) * Math.pow(1 - p, n - k);
                datos.push(pk);
            }
        } 
        else if (dist === 'uniforme') {
            tipoGrafica = 'line';
            const a = parseFloat(document.getElementById('param-a').value);
            const b = parseFloat(document.getElementById('param-b').value);
            
            // Validación para evitar que 'a' sea mayor o igual que 'b'
            if (a >= b) {
                document.getElementById('param-b').value = a + 1;
                actualizarGrafica();
                return;
            }

            document.getElementById('val-a').innerText = a;
            document.getElementById('val-b').innerText = b;

            // Dibujar la distribución uniforme (forma de caja)
            labels = [a - 2, a, a, b, b, b + 2];
            datos = [0, 0, 1 / (b - a), 1 / (b - a), 0, 0];
        } 
        else if (dist === 'bernoulli') {
            tipoGrafica = 'bar';
            const p = parseFloat(document.getElementById('param-bp').value);
            document.getElementById('val-bp').innerText = p;

            labels = ['Fracaso (0)', 'Éxito (1)'];
            datos = [1 - p, p];
        }

        // Renderizar o actualizar la gráfica con Chart.js
        if (miGrafica) miGrafica.destroy();
        
        miGrafica = new Chart(ctx, {
            type: tipoGrafica,
            data: {
                labels: labels,
                datasets: [{
                    label: 'Probabilidad / Densidad',
                    data: datos,
                    borderColor: '#4F46E5',
                    backgroundColor: tipoGrafica === 'line' ? 'rgba(79, 70, 229, 0.1)' : '#4F46E5',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    // Inicializar el sistema al cargar la página
    cambiarDistribucion();
</script>
</body>
</html>
