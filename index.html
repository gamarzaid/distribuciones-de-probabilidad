<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avanzado de Distribuciones</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Barra lateral izquierda */
        .sidebar {
            width: 340px;
            background-color: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
        }
        h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 5px;
            border-bottom: 2px solid #4F46E5;
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
        }
        .value-display {
            font-family: monospace;
            font-weight: bold;
            color: #4F46E5;
            float: right;
        }
        select, input[type="range"], input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
        }
        .prob-box {
            background-color: #EEF2FF;
            border: 1px solid #C7D2FE;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            color: #3730A3;
            margin-top: 5px;
        }
        /* Área principal */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8fafc;
        }
        .chart-container {
            width: 100%;
            max-width: 950px;
            height: 520px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Distribuciones</h2>
        
        <div class="control-group">
            <label for="distSelect">Selecciona Modelo:</label>
            <select id="distSelect" onchange="cambiarDistribucion()">
                <option value="normal">Normal (Gaussiana)</option>
                <option value="binomial">Binomial</option>
                <option value="uniforme">Uniforme Continua</option>
                <option value="bernoulli">Bernoulli</option>
            </select>
        </div>

        <div id="controls-normal" class="dist-controls">
            <div class="control-group">
                <label>Media (μ): <span class="value-display" id="val-mu">0</span></label>
                <input type="range" id="param-mu" min="-10" max="10" step="0.5" value="0" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label>Desv. Estándar (σ): <span class="value-display" id="val-sigma">1</span></label>
                <input type="range" id="param-sigma" min="0.5" max="5" step="0.1" value="1" oninput="actualizarGrafica()">
            </div>
            
            <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 15px 0;">
            <label style="color: #111827; font-size: 14px; margin-bottom: 8px; display: block;">📍 Find Probability (Calcular):</label>
            
            <div class="control-group">
                <label for="probType">Tipo de Región:</label>
                <select id="probType" onchange="toggleProbInputs()">
                    <option value="lower">Izquierda: P(X ≤ x)</option>
                    <option value="upper">Derecha: P(X ≥ x)</option>
                    <option value="between">Intervalo: P(a ≤ X ≤ b)</option>
                </select>
            </div>

            <div class="control-group" id="input-x-container">
                <label for="val-x">Valor de x:</label>
                <input type="number" id="val-x" value="1" step="0.1" oninput="actualizarGrafica()">
            </div>

            <div id="input-between-container" style="display: none; gap: 10px;">
                <div class="control-group" style="flex: 1;">
                    <label for="val-a">Valor a:</label>
                    <input type="number" id="val-a" value="-1" step="0.1" oninput="actualizarGrafica()">
                </div>
                <div class="control-group" style="flex: 1;">
                    <label for="val-b">Valor b:</label>
                    <input type="number" id="val-b" value="1" step="0.1" oninput="actualizarGrafica()">
                </div>
            </div>

            <div class="prob-box" id="resultado-probabilidad">
                P(X ≤ 1) = 0.8413
            </div>
        </div>

        <div id="controls-binomial" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label>Ensayos (n): <span class="value-display" id="val-n">20</span></label>
                <input type="range" id="param-n" min="1" max="80" step="1" value="20" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label>Probabilidad éxito (p): <span class="value-display" id="val-p">0.5</span></label>
                <input type="range" id="param-p" min="0" max="1" step="0.01" value="0.5" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-uniforme" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label>Mínimo (a): <span class="value-display" id="val-a-uni">0</span></label>
                <input type="range" id="param-a" min="-10" max="4" step="1" value="0" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label>Máximo (b): <span class="value-display" id="val-b-uni">10</span></label>
                <input type="range" id="param-b" min="5" max="20" step="1" value="10" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-bernoulli" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label>Probabilidad (p): <span class="value-display" id="val-bp">0.5</span></label>
                <input type="range" id="param-bp" min="0" max="1" step="0.05" value="0.5" oninput="actualizarGrafica()">
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-container">
            <canvas id="canvasGrafica"></canvas>
        </div>
    </div>

<script>
    let miGrafica;
    const ctx = document.getElementById('canvasGrafica').getContext('2d');

    function cambiarDistribucion() {
        const dist = document.getElementById('distSelect').value;
        document.querySelectorAll('.dist-controls').forEach(el => el.style.display = 'none');
        document.getElementById('controls-' + dist).style.display = 'block';
        actualizarGrafica();
    }

    function toggleProbInputs() {
        const type = document.getElementById('probType').value;
        if (type === 'between') {
            document.getElementById('input-x-container').style.display = 'none';
            document.getElementById('input-between-container').style.display = 'flex';
        } else {
            document.getElementById('input-x-container').style.display = 'block';
            document.getElementById('input-between-container').style.display = 'none';
        }
        actualizarGrafica();
    }

    function factorial(n) {
        if (n <= 1) return 1;
        let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
    }

    // Función de aproximación para la CDF Normal (Necesaria para calcular la probabilidad exacta)
    function cdfNormal(x, mu, sigma) {
        let z = (x - mu) / sigma;
        let t = 1.0 / (1.0 + 0.2316419 * Math.abs(z));
        let d = 0.3989423 * Math.exp(-z * z / 2.0);
        let p = d * t * (0.31938153 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
        if (z > 0) p = 1.0 - p;
        return p;
    }

    function actualizarGrafica() {
        const dist = document.getElementById('distSelect').value;
        let labels = [], datos = [], coloresPuntos = [], espesorLineas = [], fondoColores = [];
        let tipoGrafica = 'line';

        if (dist === 'normal') {
            const mu = parseFloat(document.getElementById('param-mu').value);
            const sigma = parseFloat(document.getElementById('param-sigma').value);
            const type = document.getElementById('probType').value;
            
            document.getElementById('val-mu').innerText = mu;
            document.getElementById('val-sigma').innerText = sigma;

            let valX = parseFloat(document.getElementById('val-x').value) || 0;
            let valA = parseFloat(document.getElementById('val-a').value) || 0;
            let valB = parseFloat(document.getElementById('val-b').value) || 0;

            let pCalculada = 0;

            // Generar la curva
            for (let x = mu - 4 * sigma; x <= mu + 4 * sigma; x += sigma / 15) {
                labels.push(x.toFixed(2));
                let fx = (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
                datos.push(fx);

                // Determinar si este punto 'x' cae dentro de la región seleccionada para pintarlo
                let evaluarPunto = false;
                if (type === 'lower' && x <= valX) evaluarPunto = true;
                if (type === 'upper' && x >= valX) evaluarPunto = true;
                if (type === 'between' && x >= valA && x <= valB) evaluarPunto = true;

                fondoColores.push(evaluarPunto ? 'rgba(79, 70, 229, 0.4)' : 'rgba(79, 70, 229, 0.02)');
            }

            // Calcular los textos de probabilidad reales de la caja iStats
            if (type === 'lower') {
                pCalculada = cdfNormal(valX, mu, sigma);
                document.getElementById('resultado-probabilidad').innerText = `P(X ≤ ${valX}) = ${pCalculada.toFixed(4)}`;
            } else if (type === 'upper') {
                pCalculada = 1 - cdfNormal(valX, mu, sigma);
                document.getElementById('resultado-probabilidad').innerText = `P(X ≥ ${valX}) = ${pCalculada.toFixed(4)}`;
            } else if (type === 'between') {
                pCalculada = cdfNormal(valB, mu, sigma) - cdfNormal(valA, mu, sigma);
                if (pCalculada < 0) pCalculada = 0;
                document.getElementById('resultado-probabilidad').innerText = `P(${valA} ≤ X ≤ ${valB}) = ${pCalculada.toFixed(4)}`;
            }
        } 
        else if (dist === 'binomial') {
            tipoGrafica = 'bar';
            const n = parseInt(document.getElementById('param-n').value);
            const p = parseFloat(document.getElementById('param-p').value);
            document.getElementById('val-n').innerText = n;
            document.getElementById('val-p').innerText = p;

            for (let k = 0; k <= n; k++) {
                labels.push(k);
                let comb = factorial(n) / (factorial(k) * factorial(n - k));
                let pk = comb * Math.pow(p, k) * Math.pow(1 - p, n - k);
                datos.push(pk);
                fondoColores.push('#4F46E5');
            }
        } 
        else if (dist === 'uniforme') {
            tipoGrafica = 'line';
            const a = parseFloat(document.getElementById('param-a').value);
            const b = parseFloat(document.getElementById('param-b').value);
            if (a >= b) { document.getElementById('param-b').value = a + 1; actualizarGrafica(); return; }
            
            document.getElementById('val-a-uni').innerText = a;
            document.getElementById('val-b-uni').innerText = b;

            labels = [a - 2, a, a, b, b, b + 2];
            datos = [0, 0, 1 / (b - a), 1 / (b - a), 0, 0];
            fondoColores = ['transparent', 'rgba(79, 70, 229, 0.1)', 'rgba(79, 70, 229, 0.1)', 'rgba(79, 70, 229, 0.1)', 'rgba(79, 70, 229, 0.1)', 'transparent'];
        } 
        else if (dist === 'bernoulli') {
            tipoGrafica = 'bar';
            const p = parseFloat(document.getElementById('param-bp').value);
            document.getElementById('val-bp').innerText = p;
            labels = ['Fracaso (0)', 'Éxito (1)'];
            datos = [1 - p, p];
            fondoColores = ['#4F46E5', '#4F46E5'];
        }

        if (miGrafica) miGrafica.destroy();
        
        miGrafica = new Chart(ctx, {
            type: tipoGrafica,
            data: {
                labels: labels,
                datasets: [{
                    label: 'Densidad de Probabilidad',
                    data: datos,
                    borderColor: '#4F46E5',
                    backgroundColor: dist === 'normal' ? fondoColores : (tipoGrafica === 'line' ? 'rgba(79, 70, 229, 0.1)' : '#4F46E5'),
                    borderWidth: 2,
                    fill: true,
                    tension: 0.2,
                    pointRadius: 0 // Quita los círculos de los puntos para que se vea una curva limpia como iStats
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true },
                    x: { ticks: { maxTicksLimit: 15 } } // Evita que los números del eje X se amontonen
                }
            }
        });
    }

    // Inicialización del sistema
    cambiarDistribucion();
</script>
</body>
</html>
