<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Avanzado de Distribuciones</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 340px;
            background-color: #ffffff;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 10;
            overflow-y: auto;
        }
        h2 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 5px;
            border-bottom: 2px solid #4F46E5;
            padding-bottom: 10px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 12px;
        }
        label { font-size: 13px; font-weight: 600; color: #4b5563; }
        select, input[type="range"], input[type="number"] {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
        }
        input[type="number"]:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        .prob-box {
            background-color: #EEF2FF;
            border: 1px solid #C7D2FE;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            color: #3730A3;
            margin-top: 5px;
        }
        .main-content {
            flex-grow: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f8fafc;
        }
        .chart-container {
            width: 100%;
            max-width: 950px;
            height: 520px;
            background: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Distribuciones</h2>
        
        <div class="control-group">
            <label for="distSelect">Selecciona Modelo:</label>
            <select id="distSelect" onchange="cambiarDistribucion()">
                <option value="normal">Normal (Gaussiana)</option>
                <option value="binomial">Binomial</option>
                <option value="uniforme">Uniforme Continua</option>
                <option value="bernoulli">Bernoulli</option>
            </select>
        </div>

        <div id="controls-normal" class="dist-controls">
            <div class="control-group">
                <label for="param-mu">Media (μ):</label>
                <input type="number" id="param-mu" value="0" step="any" oninput="ajustarValoresProbabilidad(); actualizarGrafica()">
            </div>
            <div class="control-group">
                <label for="param-sigma">Desv. Estándar (σ):</label>
                <input type="number" id="param-sigma" value="1" min="0.001" step="any" oninput="ajustarValoresProbabilidad(); actualizarGrafica()">
            </div>
            
            <hr style="border: 0; border-top: 1px solid #e5e7eb; margin: 15px 0;">
            <label style="color: #111827; font-size: 14px; margin-bottom: 8px; display: block;">📍 Find Probability (Calcular):</label>
            
            <div class="control-group">
                <label for="probType">Tipo de Región:</label>
                <select id="probType" onchange="toggleProbInputs()">
                    <option value="lower">Izquierda: P(Z ≤ z)</option>
                    <option value="upper">Derecha: P(Z ≥ z)</option>
                    <option value="between" selected>Intervalo: P(a ≤ Z ≤ b)</option>
                </select>
            </div>

            <div class="control-group" id="input-x-container" style="display: none;">
                <label for="val-x">Valor de x:</label>
                <input type="number" id="val-x" value="1" step="any" oninput="actualizarGrafica()">
            </div>

            <div id="input-between-container" style="display: flex; gap: 10px;">
                <div class="control-group" style="flex: 1;">
                    <label for="val-a">Valor a:</label>
                    <input type="number" id="val-a" value="-1" step="any" oninput="actualizarGrafica()">
                </div>
                <div class="control-group" style="flex: 1;">
                    <label for="val-b">Valor b:</label>
                    <input type="number" id="val-b" value="1" step="any" oninput="actualizarGrafica()">
                </div>
            </div>

            <div class="prob-box" id="resultado-probabilidad">
                P(-1 ≤ Z ≤ 1) = 0.6827
            </div>
        </div>

        <div id="controls-binomial" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label for="param-n">Ensayos (n):</label>
                <input type="range" id="param-n" min="1" max="80" step="1" value="20" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label for="param-p">Probabilidad éxito (p):</label>
                <input type="range" id="param-p" min="0" max="1" step="0.01" value="0.5" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-uniforme" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label for="param-a">Mínimo (a):</label>
                <input type="range" id="param-a" min="-10" max="4" step="1" value="0" oninput="actualizarGrafica()">
            </div>
            <div class="control-group">
                <label for="param-b">Máximo (b):</label>
                <input type="range" id="param-b" min="5" max="20" step="1" value="10" oninput="actualizarGrafica()">
            </div>
        </div>

        <div id="controls-bernoulli" class="dist-controls" style="display:none;">
            <div class="control-group">
                <label for="param-bp">Probabilidad (p):</label>
                <input type="range" id="param-bp" min="0" max="1" step="0.05" value="0.5" oninput="actualizarGrafica()">
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chart-container">
            <canvas id="canvasGrafica"></canvas>
        </div>
    </div>

<script>
    let miGrafica;
    const ctx = document.getElementById('canvasGrafica').getContext('2d');

    let ultimaZ_x = 1.0;
    let ultimaZ_a = -1.0;
    let ultimaZ_b = 1.0;

    function cambiarDistribucion() {
        const dist = document.getElementById('distSelect').value;
        document.querySelectorAll('.dist-controls').forEach(el => el.style.display = 'none');
        document.getElementById('controls-' + dist).style.display = 'block';
        actualizarGrafica();
    }

    function toggleProbInputs() {
        const type = document.getElementById('probType').value;
        if (type === 'between') {
            document.getElementById('input-x-container').style.display = 'none';
            document.getElementById('input-between-container').style.display = 'flex';
        } else {
            document.getElementById('input-x-container').style.display = 'block';
            document.getElementById('input-between-container').style.display = 'none';
        }
        actualizarGrafica();
    }

    function ajustarValoresProbabilidad() {
        let mu = parseFloat(document.getElementById('param-mu').value);
        let sigma = parseFloat(document.getElementById('param-sigma').value);

        if (isNaN(mu)) mu = 0;
        if (isNaN(sigma) || sigma <= 0) sigma = 1;

        document.getElementById('val-x').value = (mu + ultimaZ_x * sigma).toFixed(2);
        document.getElementById('val-a').value = (mu + ultimaZ_a * sigma).toFixed(2);
        document.getElementById('val-b').value = (mu + ultimaZ_b * sigma).toFixed(2);
    }

    function factorial(n) {
        if (n <= 1) return 1;
        let r = 1; for (let i = 2; i <= n; i++) r *= i; return r;
    }

    function cdfNormal(x, mu, sigma) {
        let z = (x - mu) / sigma;
        let t = 1.0 / (1.0 + 0.2316419 * Math.abs(z));
        let d = 0.3989423 * Math.exp(-z * z / 2.0);
        let p = d * t * (0.31938153 + t * (-0.356563782 + t * (1.781477937 + t * (-1.821255978 + t * 1.330274429))));
        if (z > 0) p = 1.0 - p;
        return p;
    }

    function actualizarGrafica() {
        const dist = document.getElementById('distSelect').value;
        let labels = [], datosCurvaCompleta = [], datosSombreado = [];
        let tipoGrafica = 'line';
        let datasets = [];
        let opcionesEjes = {};

        if (dist === 'normal') {
            tipoGrafica = 'line';
            let mu = parseFloat(document.getElementById('param-mu').value);
            let sigma = parseFloat(document.getElementById('param-sigma').value);
            const type = document.getElementById('probType').value;

            if (isNaN(mu)) mu = 0;
            if (isNaN(sigma) || sigma <= 0) sigma = 0.1; 

            let valX = parseFloat(document.getElementById('val-x').value);
            let valA = parseFloat(document.getElementById('val-a').value);
            let valB = parseFloat(document.getElementById('val-b').value);

            if (isNaN(valX)) valX = 0;
            if (isNaN(valA)) valA = 0;
            if (isNaN(valB)) valB = 0;

            ultimaZ_x = (valX - mu) / sigma;
            ultimaZ_a = (valA - mu) / sigma;
            ultimaZ_b = (valB - mu) / sigma;

            let pCalculada = 0;
            let inicio = mu - 4 * sigma;
            let fin = mu + 4 * sigma;
            let paso = (fin - inicio) / 150; 

            for (let x = inicio; x <= fin; x += paso) {
                let fx = (1 / (sigma * Math.sqrt(2 * Math.PI))) * Math.exp(-0.5 * Math.pow((x - mu) / sigma, 2));
                datosCurvaCompleta.push({ x: x, y: fx });

                let colorear = false;
                if (type === 'lower' && x <= valX) colorear = true;
                if (type === 'upper' && x >= valX) colorear = true;
                if (type === 'between' && x >= valA && x <= valB) colorear = true;

                if (colorear) {
                    datosSombreado.push({ x: x, y: fx });
                }
            }

            let marcasEjeX = [];
            if (type === 'between') {
                marcasEjeX = [inicio, valA, mu, valB, fin];
            } else {
                marcasEjeX = [inicio, valX, mu, fin];
            }
            marcasEjeX.sort((o1, o2) => o1 - o2);

            const esEstandar = (mu === 0 && sigma === 1);
            const variableLetra = esEstandar ? 'Z' : 'X';
            const variableLetraMinuscula = esEstandar ? 'z' : 'x';

            const comboRegiones = document.getElementById('probType');
            if (comboRegiones) {
                comboRegiones.options[0].text = `Izquierda: P(${variableLetra} ≤ ${variableLetraMinuscula})`;
                comboRegiones.options[1].text = `Derecha: P(${variableLetra} ≥ ${variableLetraMinuscula})`;
                comboRegiones.options[2].text = `Intervalo: P(a ≤ ${variableLetra} ≤ b)`;
            }

            opcionesEjes = {
                x: { 
                    type: 'linear', 
                    position: 'bottom', 
                    min: inicio, // MANTIENE EL LÍMITE FIJO
                    max: fin,    // MANTIENE EL LÍMITE FIJO
                    grid: { display: false },
                    afterBuildTicks: function(scale) {
                        scale.ticks = marcasEjeX.map(v => ({ value: v }));
                    },
                    ticks: {
                        callback: function(value) {
                            if (Math.abs(value - mu) < (sigma * 0.005)) return value.toFixed(2) + " (μ)";
                            return value.toFixed(2);
                        }
                    }
                },
                y: { 
                    beginAtZero: true,
                    grid: { display: false }
                }
            };

            datasets = [
                {
                    label: 'Área Sombreada',
                    data: datosSombreado,
                    borderColor: 'transparent',
                    backgroundColor: 'rgba(79, 70, 229, 0.45)', 
                    fill: 'origin',
                    pointRadius: 0,
                    tension: 0
                },
                {
                    label: 'Curva Normal',
                    data: datosCurvaCompleta,
                    borderColor: '#4F46E5',
                    borderWidth: 2.5,
                    fill: false,
                    pointRadius: 0,
                    tension: 0
                }
            ];

            if (type === 'lower') {
                pCalculada = cdfNormal(valX, mu, sigma);
                document.getElementById('resultado-probabilidad').innerText = `P(${variableLetra} ≤ ${valX.toFixed(2)}) = ${pCalculada.toFixed(4)}`;
            } else if (type === 'upper') {
                pCalculada = 1 - cdfNormal(valX, mu, sigma);
                document.getElementById('resultado-probabilidad').innerText = `P(${variableLetra} ≥ ${valX.toFixed(2)}) = ${pCalculada.toFixed(4)}`;
            } else if (type === 'between') {
                pCalculada = cdfNormal(valB, mu, sigma) - cdfNormal(valA, mu, sigma);
                if (pCalculada < 0) pCalculada = 0;
                document.getElementById('resultado-probabilidad').innerText = `P(${valA.toFixed(2)} ≤ ${variableLetra} ≤ ${valB.toFixed(2)}) = ${pCalculada.toFixed(4)}`;
            }
        } 
        else if (dist === 'binomial') {
            tipoGrafica = 'bar';
            const n = parseInt(document.getElementById('param-n').value);
            const p = parseFloat(document.getElementById('param-p').value);

            for (let k = 0; k <= n; k++) {
                labels.push(k);
                let comb = factorial(n) / (factorial(k) * factorial(n - k));
                datosCurvaCompleta.push(comb * Math.pow(p, k) * Math.pow(1 - p, n - k));
            }
            datasets = [{ data: datosCurvaCompleta, backgroundColor: '#4F46E5' }];
            opcionesEjes = { 
                x: { grid: { display: false } },
                y: { beginAtZero: true, grid: { display: false } }
            };
        } 
        else if (dist === 'uniforme') {
            tipoGrafica = 'line';
            const a = parseFloat(document.getElementById('param-a').value);
            const b = parseFloat(document.getElementById('param-b').value);
            if (a >= b) { document.getElementById('param-b').value = a + 1; actualizarGrafica(); return; }

            labels = [a - 2, a, a, b, b, b + 2];
            datosCurvaCompleta = [0, 0, 1 / (b - a), 1 / (b - a), 0, 0];
            
            datasets = [{
                data: datosCurvaCompleta,
                borderColor: '#4F46E5',
                backgroundColor: 'rgba(79, 70, 229, 0.1)',
                fill: true,
                tension: 0,
                pointRadius: 0
            }];
            opcionesEjes = { 
                x: { grid: { display: false } },
                y: { beginAtZero: true, grid: { display: false } }
            };
        } 
        else if (dist === 'bernoulli') {
            tipoGrafica = 'bar';
            const p = parseFloat(document.getElementById('param-bp').value);
            labels = ['Fracaso (0)', 'Éxito (1)'];
            datosCurvaCompleta = [1 - p, p];
            
            datasets = [{ data: datosCurvaCompleta, backgroundColor: '#4F46E5' }];
            opcionesEjes = { 
                x: { grid: { display: false } },
                y: { beginAtZero: true, grid: { display: false } }
            };
        }

        if (miGrafica) miGrafica.destroy();
        
        miGrafica = new Chart(ctx, {
            type: tipoGrafica,
            data: {
                labels: dist !== 'normal' ? labels : undefined, 
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false, // APAGA LAS ANIMACIONES ELÁSTICAS COMPLETAMENTE
                plugins: { legend: { display: false } },
                scales: opcionesEjes
            }
        });
    }

    cambiarDistribucion();
</script>
</body>
</html>
